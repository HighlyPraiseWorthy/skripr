<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#g)"/>
  <!-- Upper lobe: pointed top, extends right, diagonal cuts to lower-left -->
  <polygon points="16,3 26,8 26,15 6,18 6,8"
    fill="white" stroke="black" stroke-width="1" stroke-linejoin="round"/>
  <!-- Lower lobe: pointed bottom, extends left, diagonal cuts to upper-right -->
  <polygon points="16,29 6,24 6,15 26,18 26,24"
    fill="white" stroke="black" stroke-width="1" stroke-linejoin="round"/>
</svg>
