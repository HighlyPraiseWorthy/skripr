<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Purple gradient background -->
  <rect width="32" height="32" rx="6" fill="url(#g)"/>
  <!-- Angular S: upper lobe (pointed top, extends right, diagonal bottom) -->
  <polygon points="16,3 25,8 25,16 7,17 7,8" fill="white"/>
  <!-- Angular S: lower lobe (pointed bottom, extends left, diagonal top) -->
  <polygon points="16,29 7,24 7,16 25,15 25,24" fill="white"/>
</svg>
